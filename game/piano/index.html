<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Piano</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      color: #e8d5b7;
      text-shadow: 0 0 20px rgba(232, 213, 183, 0.3);
    }

    .hint {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
      letter-spacing: 0.1em;
    }

    .piano {
      position: relative;
      display: flex;
      height: 220px;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(232, 213, 183, 0.05);
      user-select: none;
    }

    .white-key {
      width: 48px;
      height: 220px;
      background: linear-gradient(180deg, #f8f8f8 0%, #e8e8e8 100%);
      border: 1px solid #bbb;
      border-radius: 0 0 6px 6px;
      margin: 0 1px;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: background 0.05s, transform 0.05s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 12px;
    }

    .white-key:hover {
      background: linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
    }

    .white-key.active {
      background: linear-gradient(180deg, #ddd 0%, #ccc 100%);
      transform: translateY(2px);
      box-shadow: inset 0 -4px 8px rgba(0,0,0,0.15);
    }

    .white-key .label {
      font-size: 0.7rem;
      color: #999;
      font-weight: 600;
      pointer-events: none;
    }

    .black-key {
      width: 30px;
      height: 140px;
      background: linear-gradient(180deg, #333 0%, #111 100%);
      border-radius: 0 0 4px 4px;
      position: absolute;
      z-index: 2;
      cursor: pointer;
      transition: background 0.05s, transform 0.05s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
    }

    .black-key:hover {
      background: linear-gradient(180deg, #444 0%, #222 100%);
    }

    .black-key.active {
      background: linear-gradient(180deg, #222 0%, #000 100%);
      transform: translateY(2px);
      height: 138px;
    }

    .black-key .label {
      font-size: 0.6rem;
      color: #777;
      font-weight: 600;
      pointer-events: none;
    }

    /* Black key positioning: offsets from the left edge of .piano */
    /* Each white key is 50px wide (48 + 2 margin) */
    /* Black keys sit between specific white keys */
    .black-key[data-note="Cs3"] { left: 35px; }
    .black-key[data-note="Ds3"] { left: 85px; }
    .black-key[data-note="Fs3"] { left: 185px; }
    .black-key[data-note="Gs3"] { left: 235px; }
    .black-key[data-note="As3"] { left: 285px; }
    .black-key[data-note="Cs4"] { left: 385px; }
    .black-key[data-note="Ds4"] { left: 435px; }
    .black-key[data-note="Fs4"] { left: 535px; }
    .black-key[data-note="Gs4"] { left: 585px; }
    .black-key[data-note="As4"] { left: 635px; }
    .black-key[data-note="Cs5"] { left: 735px; }
    .black-key[data-note="Ds5"] { left: 785px; }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Virtual Piano</h1>
  <p class="hint">鼠标点击或键盘演奏 &mdash; 白键: A S D F G H J K L ; ' &nbsp;|&nbsp; 黑键: W E T Y U O P ]</p>

  <div class="piano" id="piano">
    <!-- White keys -->
    <div class="white-key" data-note="C3"><span class="label">A</span></div>
    <div class="white-key" data-note="D3"><span class="label">S</span></div>
    <div class="white-key" data-note="E3"><span class="label">D</span></div>
    <div class="white-key" data-note="F3"><span class="label">F</span></div>
    <div class="white-key" data-note="G3"><span class="label">G</span></div>
    <div class="white-key" data-note="A3"><span class="label">H</span></div>
    <div class="white-key" data-note="B3"><span class="label">J</span></div>
    <div class="white-key" data-note="C4"><span class="label">K</span></div>
    <div class="white-key" data-note="D4"><span class="label">L</span></div>
    <div class="white-key" data-note="E4"><span class="label">;</span></div>
    <div class="white-key" data-note="F4"><span class="label">'</span></div>
    <div class="white-key" data-note="G4"><span class="label">Z</span></div>
    <div class="white-key" data-note="A4"><span class="label">X</span></div>
    <div class="white-key" data-note="B4"><span class="label">C</span></div>
    <div class="white-key" data-note="C5"><span class="label">V</span></div>
    <div class="white-key" data-note="D5"><span class="label">B</span></div>
    <div class="white-key" data-note="E5"><span class="label">N</span></div>

    <!-- Black keys -->
    <div class="black-key" data-note="Cs3"><span class="label">W</span></div>
    <div class="black-key" data-note="Ds3"><span class="label">E</span></div>
    <div class="black-key" data-note="Fs3"><span class="label">T</span></div>
    <div class="black-key" data-note="Gs3"><span class="label">Y</span></div>
    <div class="black-key" data-note="As3"><span class="label">U</span></div>
    <div class="black-key" data-note="Cs4"><span class="label">O</span></div>
    <div class="black-key" data-note="Ds4"><span class="label">P</span></div>
    <div class="black-key" data-note="Fs4"><span class="label">]</span></div>
    <div class="black-key" data-note="Gs4"><span class="label">[</span></div>
    <div class="black-key" data-note="As4"><span class="label">M</span></div>
  </div>

  <p class="footer">Powered by Web Audio API &mdash; No external files needed</p>

  <script>
    // ============================================================
    //  Piano Synthesizer (Web Audio API)
    // ============================================================

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Note name -> frequency (Hz), equal temperament, A4=440
    const FREQ_MAP = {
      C3: 130.81, Cs3: 138.59, D3: 146.83, Ds3: 155.56, E3: 164.81,
      F3: 174.61, Fs3: 185.00, G3: 196.00, Gs3: 207.65, A3: 220.00,
      As3: 233.08, B3: 246.94,
      C4: 261.63, Cs4: 277.18, D4: 293.66, Ds4: 311.13, E4: 329.63,
      F4: 349.23, Fs4: 369.99, G4: 392.00, Gs4: 415.30, A4: 440.00,
      As4: 466.16, B4: 493.88,
      C5: 523.25, Cs5: 554.37, D5: 587.33, Ds5: 622.25, E5: 659.25
    };

    // Keyboard mapping: key -> note
    const KEY_MAP = {
      // White keys row 1
      a: 'C3', s: 'D3', d: 'E3', f: 'F3', g: 'G3', h: 'A3', j: 'B3',
      k: 'C4', l: 'D4', ';': 'E4', "'": 'F4',
      // White keys row 2
      z: 'G4', x: 'A4', c: 'B4', v: 'C5', b: 'D5', n: 'E5',
      // Black keys
      w: 'Cs3', e: 'Ds3', t: 'Fs3', y: 'Gs3', u: 'As3',
      o: 'Cs4', p: 'Ds4', ']': 'Fs4', '[': 'Gs4', m: 'As4'
    };

    // Track pressed keys to avoid retriggering while held
    const pressedKeys = new Set();

    /**
     * Synthesize a piano-like tone with layered harmonics and natural decay.
     * Uses additive synthesis: fundamental + 3 harmonics with different envelopes.
     */
    function playNote(noteName) {
      const freq = FREQ_MAP[noteName];
      if (!freq) return;

      // Resume AudioContext if suspended (browser autoplay policy)
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const now = audioCtx.currentTime;
      const masterGain = audioCtx.createGain();

      // Low-pass filter to warm up the tone
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(freq * 6, now);
      filter.frequency.exponentialRampToValueAtTime(freq * 2, now + 1.5);
      filter.Q.setValueAtTime(1, now);

      filter.connect(masterGain);
      masterGain.connect(audioCtx.destination);

      // Harmonic ratios and relative amplitudes for piano timbre
      const harmonics = [
        { ratio: 1, amp: 0.5, decay: 2.0 },   // fundamental
        { ratio: 2, amp: 0.15, decay: 1.2 },   // 2nd harmonic
        { ratio: 3, amp: 0.08, decay: 0.8 },   // 3rd harmonic
        { ratio: 4.02, amp: 0.04, decay: 0.5 } // 4th (slightly detuned for richness)
      ];

      harmonics.forEach(h => {
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq * h.ratio, now);

        oscGain.gain.setValueAtTime(0, now);
        oscGain.gain.linearRampToValueAtTime(h.amp, now + 0.005); // fast attack
        oscGain.gain.exponentialRampToValueAtTime(h.amp * 0.3, now + 0.15); // initial decay
        oscGain.gain.exponentialRampToValueAtTime(0.0001, now + h.decay); // sustain decay

        osc.connect(oscGain);
        oscGain.connect(filter);
        osc.start(now);
        osc.stop(now + h.decay + 0.1);
      });

      // Master envelope: slight boost then natural fade
      masterGain.gain.setValueAtTime(0.7, now);
      masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);
    }

    // ============================================================
    //  UI Interaction
    // ============================================================

    const pianoEl = document.getElementById('piano');
    const allKeys = pianoEl.querySelectorAll('.white-key, .black-key');

    // Build a map: note -> DOM element
    const noteToEl = {};
    allKeys.forEach(el => {
      noteToEl[el.dataset.note] = el;
    });

    function activateKey(noteName) {
      const el = noteToEl[noteName];
      if (!el) return;
      el.classList.add('active');
      playNote(noteName);
    }

    function deactivateKey(noteName) {
      const el = noteToEl[noteName];
      if (!el) return;
      el.classList.remove('active');
    }

    // Mouse/touch events on piano keys
    allKeys.forEach(el => {
      el.addEventListener('mousedown', () => {
        audioCtx.resume();
        activateKey(el.dataset.note);
      });
      el.addEventListener('mouseup', () => deactivateKey(el.dataset.note));
      el.addEventListener('mouseleave', () => deactivateKey(el.dataset.note));
      // Touch support
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        audioCtx.resume();
        activateKey(el.dataset.note);
      });
      el.addEventListener('touchend', (e) => {
        e.preventDefault();
        deactivateKey(el.dataset.note);
      });
    });

    // Keyboard events
    document.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const key = e.key.toLowerCase();
      if (pressedKeys.has(key)) return;
      const note = KEY_MAP[key];
      if (note) {
        pressedKeys.add(key);
        activateKey(note);
      }
    });

    document.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      const note = KEY_MAP[key];
      if (note) {
        pressedKeys.delete(key);
        deactivateKey(note);
      }
    });
  </script>
</body>
</html>
