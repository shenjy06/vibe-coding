<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 渐变生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            background: linear-gradient(135deg, #f472b6, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }
        .panel h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .preview-area {
            width: 100%;
            height: 300px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .gradient-bar {
            height: 40px;
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
            cursor: pointer;
        }
        .color-stop {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .color-stop.active { border-color: #f59e0b; z-index: 10; }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
        }
        select:focus, input:focus { outline: none; border-color: #a78bfa; }
        select option { background: #1a1a2e; }
        .angle-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #a78bfa;
            border-radius: 50%;
            cursor: pointer;
        }
        .angle-value {
            min-width: 40px;
            text-align: center;
            font-size: 14px;
            color: #a78bfa;
        }
        .color-stops-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        .color-stop-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
        }
        input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        .stop-position {
            width: 60px;
            padding: 4px 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 12px;
            text-align: center;
        }
        .remove-stop {
            padding: 4px 8px;
            background: rgba(239,68,68,0.2);
            border: none;
            border-radius: 4px;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
        }
        .remove-stop:hover { background: rgba(239,68,68,0.4); }
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .code-output {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: #e0e0e0;
            word-break: break-all;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .preset-gradients {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .preset-gradient {
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .preset-gradient:hover { transform: scale(1.05); border-color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSS 渐变生成器</h1>
        <div class="main-layout">
            <div>
                <div class="panel" style="margin-bottom:15px;">
                    <div class="preview-area" id="preview"></div>
                    <div class="gradient-bar" id="gradientBar"></div>
                </div>
                <div class="panel">
                    <h3>CSS 代码</h3>
                    <div class="code-output" id="codeOutput"></div>
                    <button class="btn btn-primary" id="copyBtn">复制 CSS</button>
                </div>
            </div>
            <div>
                <div class="panel">
                    <h3>渐变类型</h3>
                    <div class="control-group">
                        <select id="gradientType">
                            <option value="linear">线性渐变</option>
                            <option value="radial">径向渐变</option>
                            <option value="conic">锥形渐变</option>
                        </select>
                    </div>
                    <div class="control-group" id="angleGroup">
                        <label>角度</label>
                        <div class="angle-control">
                            <input type="range" id="angle" min="0" max="360" value="135">
                            <span class="angle-value" id="angleValue">135°</span>
                        </div>
                    </div>
                    <div class="control-group" id="radialShape" style="display:none;">
                        <label>形状</label>
                        <select id="shape">
                            <option value="ellipse">椭圆</option>
                            <option value="circle">圆形</option>
                        </select>
                    </div>
                </div>
                <div class="panel">
                    <h3>颜色节点</h3>
                    <div class="color-stops-list" id="colorStopsList"></div>
                    <button class="btn btn-secondary" id="addStopBtn">+ 添加颜色</button>
                </div>
                <div class="panel">
                    <h3>预设渐变</h3>
                    <div class="preset-gradients" id="presets"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let colorStops = [
            { color: '#667eea', position: 0 },
            { color: '#764ba2', position: 100 }
        ];
        let activeStopIndex = 0;

        const presets = [
            [{ color: '#667eea', position: 0 }, { color: '#764ba2', position: 100 }],
            [{ color: '#f093fb', position: 0 }, { color: '#f5576c', position: 100 }],
            [{ color: '#4facfe', position: 0 }, { color: '#00f2fe', position: 100 }],
            [{ color: '#43e97b', position: 0 }, { color: '#38f9d7', position: 100 }],
            [{ color: '#fa709a', position: 0 }, { color: '#fee140', position: 100 }],
            [{ color: '#a18cd1', position: 0 }, { color: '#fbc2eb', position: 100 }],
            [{ color: '#ffecd2', position: 0 }, { color: '#fcb69f', position: 100 }],
            [{ color: '#ff9a9e', position: 0 }, { color: '#fecfef', position: 100 }],
            [{ color: '#f6d365', position: 0 }, { color: '#fda085', position: 100 }],
            [{ color: '#89f7fe', position: 0 }, { color: '#66a6ff', position: 100 }],
            [{ color: '#a1c4fd', position: 0 }, { color: '#c2e9fb', position: 100 }],
            [{ color: '#d4fc79', position: 0 }, { color: '#96e6a1', position: 100 }],
        ];

        function updatePreview() {
            const type = document.getElementById('gradientType').value;
            const angle = document.getElementById('angle').value;
            const shape = document.getElementById('shape').value;

            const stopsStr = colorStops.map(s => `${s.color} ${s.position}%`).join(', ');
            let css;
            if (type === 'linear') {
                css = `linear-gradient(${angle}deg, ${stopsStr})`;
            } else if (type === 'radial') {
                css = `radial-gradient(${shape}, ${stopsStr})`;
            } else {
                css = `conic-gradient(from ${angle}deg, ${stopsStr})`;
            }

            document.getElementById('preview').style.background = css;
            document.getElementById('gradientBar').style.background = css;
            document.getElementById('codeOutput').textContent = `background: ${css};`;
            renderColorStops();
        }

        function renderColorStops() {
            const list = document.getElementById('colorStopsList');
            list.innerHTML = colorStops.map((stop, i) => `
                <div class="color-stop-item">
                    <input type="color" value="${stop.color}" data-index="${i}">
                    <input type="number" class="stop-position" value="${stop.position}" min="0" max="100" data-index="${i}">
                    <span style="font-size:12px;color:#666;">%</span>
                    ${colorStops.length > 2 ? `<button class="remove-stop" data-index="${i}">删除</button>` : ''}
                </div>
            `).join('');

            list.querySelectorAll('input[type="color"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    colorStops[parseInt(e.target.dataset.index)].color = e.target.value;
                    updatePreview();
                });
            });

            list.querySelectorAll('.stop-position').forEach(input => {
                input.addEventListener('input', (e) => {
                    colorStops[parseInt(e.target.dataset.index)].position = parseInt(e.target.value) || 0;
                    updatePreview();
                });
            });

            list.querySelectorAll('.remove-stop').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    colorStops.splice(parseInt(e.target.dataset.index), 1);
                    updatePreview();
                });
            });

            // Update gradient bar stops
            const bar = document.getElementById('gradientBar');
            bar.innerHTML = colorStops.map((s, i) =>
                `<div class="color-stop ${i === activeStopIndex ? 'active' : ''}" style="left:${s.position}%;background:${s.color};" data-index="${i}"></div>`
            ).join('');
        }

        document.getElementById('addStopBtn').addEventListener('click', () => {
            colorStops.push({ color: '#ffffff', position: 50 });
            colorStops.sort((a, b) => a.position - b.position);
            activeStopIndex = colorStops.length - 1;
            updatePreview();
        });

        document.getElementById('gradientType').addEventListener('change', (e) => {
            document.getElementById('angleGroup').style.display = e.target.value === 'radial' ? 'none' : 'block';
            document.getElementById('radialShape').style.display = e.target.value === 'radial' ? 'block' : 'none';
            updatePreview();
        });

        document.getElementById('angle').addEventListener('input', (e) => {
            document.getElementById('angleValue').textContent = e.target.value + '°';
            updatePreview();
        });

        document.getElementById('shape').addEventListener('change', updatePreview);

        document.getElementById('presets').innerHTML = presets.map((p, i) =>
            `<div class="preset-gradient" style="background:linear-gradient(135deg, ${p[0].color}, ${p[1].color});" data-index="${i}"></div>`
        ).join('');

        document.querySelectorAll('.preset-gradient').forEach(el => {
            el.addEventListener('click', () => {
                colorStops = presets[el.dataset.index].map(s => ({ ...s }));
                updatePreview();
            });
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('codeOutput').textContent).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制 CSS', 1500);
            });
        });

        updatePreview();
    </script>
</body>
</html>
