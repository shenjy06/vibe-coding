<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 编解码工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab {
            padding: 10px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: #fff;
        }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.1); }
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .panel h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .editor-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: center;
        }
        @media (max-width: 768px) {
            .editor-row { grid-template-columns: 1fr; }
            .arrow-col { transform: rotate(90deg); }
        }
        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            padding: 15px;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: #667eea; }
        .arrow-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .image-section { display: none; }
        .image-section.active { display: block; }
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: #667eea; background: rgba(102,126,234,0.1); }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .upload-text { color: #888; font-size: 14px; }
        .preview-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .preview-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
        }
        .status {
            text-align: center;
            padding: 10px;
            font-size: 13px;
            color: #888;
            margin-top: 10px;
        }
        .status .error { color: #ef4444; }
        .status .success { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Base64 编解码工具</h1>
        <div class="tabs">
            <div class="tab active" data-tab="text">文本编解码</div>
            <div class="tab" data-tab="image">图片编解码</div>
        </div>
        <div id="textSection">
            <div class="panel">
                <h3>文本 Base64 转换</h3>
                <div class="editor-row">
                    <div>
                        <textarea id="plainText" placeholder="输入原始文本..."></textarea>
                    </div>
                    <div class="arrow-col">
                        <button class="btn btn-primary" id="encodeBtn">编码 →</button>
                        <button class="btn btn-secondary" id="decodeBtn">← 解码</button>
                        <button class="btn btn-secondary" id="swapBtn">交换</button>
                    </div>
                    <div>
                        <textarea id="base64Text" placeholder="Base64 编码..."></textarea>
                    </div>
                </div>
                <div class="status" id="textStatus"></div>
            </div>
        </div>
        <div id="imageSection" class="image-section">
            <div class="panel">
                <h3>图片 Base64 转换</h3>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">🖼️</div>
                    <div class="upload-text">拖拽图片到这里，或点击上传</div>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;">
                </div>
                <div class="preview-row" id="previewRow" style="display:none;">
                    <div>
                        <h3 style="font-size:13px;color:#94a3b8;margin-bottom:10px;">原始图片</h3>
                        <div class="preview-box">
                            <img id="previewImg" src="" alt="预览">
                        </div>
                    </div>
                    <div>
                        <h3 style="font-size:13px;color:#94a3b8;margin-bottom:10px;">Base64 输出</h3>
                        <textarea id="imageBase64" style="height:200px;" readonly></textarea>
                    </div>
                </div>
                <div style="margin-top:15px;display:flex;gap:10px;justify-content:center;">
                    <button class="btn btn-primary" id="copyBase64" style="width:auto;padding:10px 30px;">复制 Base64</button>
                    <button class="btn btn-secondary" id="base64ToImg" style="width:auto;padding:10px 30px;">Base64 转图片</button>
                </div>
                <div class="status" id="imageStatus"></div>
            </div>
        </div>
    </div>
    <script>
        const tabs = document.querySelectorAll('.tab');
        const textSection = document.getElementById('textSection');
        const imageSection = document.getElementById('imageSection');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.dataset.tab === 'text') {
                    textSection.style.display = 'block';
                    imageSection.classList.remove('active');
                } else {
                    textSection.style.display = 'none';
                    imageSection.classList.add('active');
                }
            });
        });

        document.getElementById('encodeBtn').addEventListener('click', () => {
            try {
                const text = document.getElementById('plainText').value;
                const encoded = btoa(unescape(encodeURIComponent(text)));
                document.getElementById('base64Text').value = encoded;
                document.getElementById('textStatus').innerHTML = '<span class="success">编码成功</span>';
            } catch (e) {
                document.getElementById('textStatus').innerHTML = '<span class="error">编码失败: ' + e.message + '</span>';
            }
        });

        document.getElementById('decodeBtn').addEventListener('click', () => {
            try {
                const base64 = document.getElementById('base64Text').value;
                const decoded = decodeURIComponent(escape(atob(base64)));
                document.getElementById('plainText').value = decoded;
                document.getElementById('textStatus').innerHTML = '<span class="success">解码成功</span>';
            } catch (e) {
                document.getElementById('textStatus').innerHTML = '<span class="error">解码失败: 无效的 Base64 字符串</span>';
            }
        });

        document.getElementById('swapBtn').addEventListener('click', () => {
            const a = document.getElementById('plainText');
            const b = document.getElementById('base64Text');
            [a.value, b.value] = [b.value, a.value];
        });

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#667eea'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'rgba(255,255,255,0.2)'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'rgba(255,255,255,0.2)';
            if (e.dataTransfer.files.length > 0) handleImage(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleImage(e.target.files[0]);
        });

        function handleImage(file) {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('imageBase64').value = e.target.result;
                document.getElementById('previewRow').style.display = 'grid';
                document.getElementById('imageStatus').innerHTML = '<span class="success">图片加载成功，Base64 已生成</span>';
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('copyBase64').addEventListener('click', () => {
            const text = document.getElementById('imageBase64').value;
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    document.getElementById('imageStatus').innerHTML = '<span class="success">已复制到剪贴板</span>';
                });
            }
        });

        document.getElementById('base64ToImg').addEventListener('click', () => {
            const base64 = prompt('粘贴 Base64 字符串:');
            if (base64) {
                document.getElementById('previewImg').src = base64;
                document.getElementById('previewRow').style.display = 'grid';
                document.getElementById('imageStatus').innerHTML = '<span class="success">图片已加载</span>';
            }
        });
    </script>
</body>
</html>
