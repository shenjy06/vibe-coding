<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正则表达式测试器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0c0a1a 0%, #1a1333 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .panel h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .regex-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .regex-slash {
            font-size: 24px;
            color: #a78bfa;
            font-weight: bold;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #a78bfa; }
        .flags-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .flag-btn {
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .flag-btn.active {
            background: rgba(167,139,250,0.3);
            border-color: #a78bfa;
            color: #a78bfa;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            padding: 15px;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }
        textarea:focus { border-color: #a78bfa; }
        .result-area {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            min-height: 150px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .match {
            background: rgba(167,139,250,0.3);
            border-radius: 3px;
            padding: 1px 2px;
        }
        .match-group {
            background: rgba(96,165,250,0.3);
            border-radius: 3px;
            padding: 1px 2px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 12px 20px;
            border-radius: 8px;
        }
        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #a78bfa;
        }
        .matches-list {
            margin-top: 15px;
        }
        .match-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px 15px;
            margin-bottom: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .match-index { color: #a78bfa; margin-right: 10px; }
        .match-value { color: #60a5fa; }
        .match-pos { color: #666; font-size: 12px; }
        .templates {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .template-btn {
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .template-btn:hover {
            background: rgba(167,139,250,0.2);
            border-color: #a78bfa;
            color: #fff;
        }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>正则表达式测试器</h1>
        <div class="panel">
            <h3>正则表达式</h3>
            <div class="regex-input-row">
                <span class="regex-slash">/</span>
                <input type="text" id="regexInput" placeholder="输入正则表达式..." value="(\w+)@(\w+)\.(\w+)">
                <span class="regex-slash">/</span>
                <span id="flagsDisplay" style="color:#a78bfa;font-size:16px;min-width:40px;">gi</span>
            </div>
            <div class="flags-group">
                <div class="flag-btn active" data-flag="g">g 全局</div>
                <div class="flag-btn active" data-flag="i">i 忽略大小写</div>
                <div class="flag-btn" data-flag="m">m 多行</div>
                <div class="flag-btn" data-flag="s">s 点匹配换行</div>
            </div>
            <div class="templates">
                <div class="template-btn" data-regex="(\w+)@(\w+)\.(\w+)" data-flags="gi">邮箱</div>
                <div class="template-btn" data-regex="1[3-9]\d{9}" data-flags="g">手机号</div>
                <div class="template-btn" data-regex="https?://[^\s]+" data-flags="gi">URL</div>
                <div class="template-btn" data-regex="\d{4}-\d{2}-\d{2}" data-flags="g">日期</div>
                <div class="template-btn" data-regex="<([a-z]+)[^>]*>.*?</\1>" data-flags="gis">HTML标签</div>
                <div class="template-btn" data-regex="\b\w+\b" data-flags="g">单词</div>
            </div>
        </div>
        <div class="panel">
            <h3>测试文本</h3>
            <textarea id="testText" placeholder="输入要测试的文本...">联系我们:
test@example.com
admin@company.org
user.name@mail.co
电话: 13812345678
官网: https://example.com
日期: 2024-01-15</textarea>
        </div>
        <div class="panel">
            <h3>匹配结果</h3>
            <div class="result-area" id="resultArea"></div>
            <div class="stats" id="statsArea"></div>
        </div>
        <div class="panel" id="matchesPanel" style="display:none;">
            <h3>匹配详情</h3>
            <div class="matches-list" id="matchesList"></div>
        </div>
    </div>
    <script>
        const regexInput = document.getElementById('regexInput');
        const testText = document.getElementById('testText');
        const resultArea = document.getElementById('resultArea');
        const statsArea = document.getElementById('statsArea');
        const matchesPanel = document.getElementById('matchesPanel');
        const matchesList = document.getElementById('matchesList');
        const flagsDisplay = document.getElementById('flagsDisplay');

        let flags = { g: true, i: true, m: false, s: false };

        document.querySelectorAll('.flag-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const flag = btn.dataset.flag;
                flags[flag] = !flags[flag];
                btn.classList.toggle('active');
                updateFlagsDisplay();
                executeRegex();
            });
        });

        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                regexInput.value = btn.dataset.regex;
                const templateFlags = btn.dataset.flags;
                Object.keys(flags).forEach(f => flags[f] = templateFlags.includes(f));
                document.querySelectorAll('.flag-btn').forEach(fb => {
                    fb.classList.toggle('active', flags[fb.dataset.flag]);
                });
                updateFlagsDisplay();
                executeRegex();
            });
        });

        function updateFlagsDisplay() {
            flagsDisplay.textContent = Object.entries(flags).filter(([k, v]) => v).map(([k]) => k).join('');
        }

        regexInput.addEventListener('input', executeRegex);
        testText.addEventListener('input', executeRegex);

        function executeRegex() {
            const pattern = regexInput.value;
            const text = testText.value;

            if (!pattern) {
                resultArea.innerHTML = '<span style="color:#666;">输入正则表达式开始测试</span>';
                statsArea.innerHTML = '';
                matchesPanel.style.display = 'none';
                return;
            }

            try {
                const flagStr = Object.entries(flags).filter(([k, v]) => v).map(([k]) => k).join('');
                const regex = new RegExp(pattern, flagStr);
                const matches = [];
                let match;

                if (flagStr.includes('g')) {
                    while ((match = regex.exec(text)) !== null) {
                        matches.push({
                            value: match[0],
                            index: match.index,
                            groups: match.slice(1)
                        });
                        if (match.index === regex.lastIndex) regex.lastIndex++;
                    }
                } else {
                    match = regex.exec(text);
                    if (match) {
                        matches.push({
                            value: match[0],
                            index: match.index,
                            groups: match.slice(1)
                        });
                    }
                }

                // Highlight matches in text
                let highlighted = '';
                let lastIndex = 0;
                matches.forEach(m => {
                    highlighted += escapeHtml(text.slice(lastIndex, m.index));
                    highlighted += `<span class="match">${escapeHtml(m.value)}</span>`;
                    lastIndex = m.index + m.value.length;
                });
                highlighted += escapeHtml(text.slice(lastIndex));
                resultArea.innerHTML = highlighted || '<span style="color:#666;">无匹配</span>';

                // Stats
                statsArea.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-label">匹配数量</div>
                        <div class="stat-value">${matches.length}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">捕获组</div>
                        <div class="stat-value">${matches.length > 0 ? matches[0].groups.length : 0}</div>
                    </div>
                `;

                // Match details
                if (matches.length > 0) {
                    matchesPanel.style.display = 'block';
                    matchesList.innerHTML = matches.map((m, i) => `
                        <div class="match-item">
                            <span class="match-index">#${i + 1}</span>
                            <span class="match-value">"${escapeHtml(m.value)}"</span>
                            <span class="match-pos"> 位置: ${m.index}-${m.index + m.value.length}</span>
                            ${m.groups.length > 0 ? `<br><span style="color:#666;margin-left:30px;">捕获组: ${m.groups.map((g, j) => `$${j+1}="${escapeHtml(g || '')}"`).join(', ')}</span>` : ''}
                        </div>
                    `).join('');
                } else {
                    matchesPanel.style.display = 'none';
                }
            } catch (e) {
                resultArea.innerHTML = `<span class="error">正则表达式错误: ${e.message}</span>`;
                statsArea.innerHTML = '';
                matchesPanel.style.display = 'none';
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        executeRegex();
    </script>
</body>
</html>
