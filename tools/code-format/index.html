<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码格式化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .btn-group {
            display: flex;
            gap: 5px;
        }
        .btn-option {
            padding: 8px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #ccc;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-option.active {
            background: rgba(102,126,234,0.3);
            border-color: #667eea;
            color: #667eea;
        }
        .editor-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media (max-width: 900px) { .editor-area { grid-template-columns: 1fr; } }
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        .panel-header {
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h3 { font-size: 13px; color: #94a3b8; }
        textarea {
            width: 100%;
            height: 400px;
            background: rgba(0,0,0,0.3);
            border: none;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            padding: 15px;
            resize: vertical;
            outline: none;
            line-height: 1.5;
            tab-size: 2;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 13px;
            color: #6b7280;
        }
        .status-bar .error { color: #ef4444; }
        .status-bar .success { color: #10b981; }
        .indent-select {
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #ccc;
            font-size: 13px;
        }
        .indent-select option { background: #1a1a2e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>代码格式化</h1>
        <div class="toolbar">
            <div class="btn-group">
                <div class="btn-option active" data-lang="javascript">JavaScript</div>
                <div class="btn-option" data-lang="html">HTML</div>
                <div class="btn-option" data-lang="css">CSS</div>
                <div class="btn-option" data-lang="json">JSON</div>
            </div>
            <select class="indent-select" id="indentSelect">
                <option value="2">缩进: 2 空格</option>
                <option value="4">缩进: 4 空格</option>
                <option value="tab">缩进: Tab</option>
            </select>
            <button class="btn btn-primary" id="formatBtn">格式化</button>
            <button class="btn btn-secondary" id="compressBtn">压缩</button>
            <button class="btn btn-secondary" id="copyBtn">复制结果</button>
            <button class="btn btn-secondary" id="clearBtn">清空</button>
        </div>
        <div class="editor-area">
            <div class="panel">
                <div class="panel-header">
                    <h3>输入代码</h3>
                    <span id="inputInfo" style="font-size:12px;color:#666;">0 行</span>
                </div>
                <textarea id="input" placeholder="在此粘贴或输入代码..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <h3>格式化结果</h3>
                    <span id="outputInfo" style="font-size:12px;color:#666;">0 行</span>
                </div>
                <textarea id="output" readonly></textarea>
            </div>
        </div>
        <div class="status-bar">
            <span id="status">就绪</span>
            <span id="stats"></span>
        </div>
    </div>
    <script>
        let currentLang = 'javascript';
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        document.querySelectorAll('.btn-option[data-lang]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-option[data-lang]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
            });
        });

        document.getElementById('formatBtn').addEventListener('click', () => {
            const code = input.value;
            if (!code.trim()) return;

            try {
                let formatted;
                const indent = document.getElementById('indentSelect').value === 'tab' ? '\t' : ' '.repeat(parseInt(document.getElementById('indentSelect').value));

                if (currentLang === 'json') {
                    formatted = JSON.stringify(JSON.parse(code), null, indent);
                } else if (currentLang === 'javascript') {
                    formatted = formatJS(code, indent);
                } else if (currentLang === 'html') {
                    formatted = formatHTML(code, indent);
                } else if (currentLang === 'css') {
                    formatted = formatCSS(code, indent);
                }

                output.value = formatted;
                updateInfo();
                document.getElementById('status').innerHTML = '<span class="success">格式化成功</span>';
            } catch (e) {
                document.getElementById('status').innerHTML = '<span class="error">错误: ' + e.message + '</span>';
            }
        });

        document.getElementById('compressBtn').addEventListener('click', () => {
            const code = input.value;
            if (!code.trim()) return;

            try {
                let compressed;
                if (currentLang === 'json') {
                    compressed = JSON.stringify(JSON.parse(code));
                } else {
                    compressed = code.replace(/\s+/g, ' ').replace(/\s*([{}:;,])\s*/g, '$1').trim();
                }
                output.value = compressed;
                updateInfo();
                const ratio = ((1 - compressed.length / code.length) * 100).toFixed(1);
                document.getElementById('stats').textContent = `压缩率: ${ratio}%`;
                document.getElementById('status').innerHTML = '<span class="success">压缩成功</span>';
            } catch (e) {
                document.getElementById('status').innerHTML = '<span class="error">错误: ' + e.message + '</span>';
            }
        });

        function formatJS(code, indent) {
            let result = '';
            let level = 0;
            let inString = false;
            let stringChar = '';

            for (let i = 0; i < code.length; i++) {
                const char = code[i];
                const next = code[i + 1];

                if (inString) {
                    result += char;
                    if (char === stringChar && code[i - 1] !== '\\') inString = false;
                    continue;
                }

                if (char === '"' || char === "'" || char === '`') {
                    inString = true;
                    stringChar = char;
                    result += char;
                    continue;
                }

                if (char === '{') {
                    result += ' {\n';
                    level++;
                    result += indent.repeat(level);
                } else if (char === '}') {
                    result = result.trimEnd() + '\n';
                    level--;
                    result += indent.repeat(level) + '}';
                    if (next === ';' || next === ',') continue;
                    result += '\n' + indent.repeat(level);
                } else if (char === ';') {
                    result += ';\n' + indent.repeat(level);
                } else if (char === '\n' || char === '\r') {
                    continue;
                } else if (char === ' ' && result.endsWith(' ')) {
                    continue;
                } else {
                    result += char;
                }
            }

            return result.replace(/\n\s*\n/g, '\n').trim();
        }

        function formatHTML(code, indent) {
            let result = '';
            let level = 0;
            const selfClosing = ['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input', 'link', 'meta', 'param', 'source', 'track', 'wbr'];

            const tokens = code.replace(/>\s*</g, '>\n<').split('\n');

            tokens.forEach(token => {
                token = token.trim();
                if (!token) return;

                if (token.startsWith('</')) {
                    level--;
                    result += indent.repeat(Math.max(0, level)) + token + '\n';
                } else if (token.startsWith('<')) {
                    result += indent.repeat(level) + token + '\n';
                    const tagMatch = token.match(/^<(\w+)/);
                    if (tagMatch && !selfClosing.includes(tagMatch[1].toLowerCase()) && !token.endsWith('/>')) {
                        level++;
                    }
                } else {
                    result += indent.repeat(level) + token + '\n';
                }
            });

            return result.trim();
        }

        function formatCSS(code, indent) {
            let result = '';
            let level = 0;

            code = code.replace(/\s+/g, ' ').trim();

            for (let i = 0; i < code.length; i++) {
                const char = code[i];

                if (char === '{') {
                    result = result.trimEnd() + ' {\n';
                    level++;
                    result += indent.repeat(level);
                } else if (char === '}') {
                    result = result.trimEnd() + '\n';
                    level--;
                    result += indent.repeat(level) + '}\n';
                    if (i < code.length - 1) result += indent.repeat(level);
                } else if (char === ';') {
                    result += ';\n' + indent.repeat(level);
                } else {
                    result += char;
                }
            }

            return result.trim();
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (output.value) {
                navigator.clipboard.writeText(output.value).then(() => {
                    const btn = document.getElementById('copyBtn');
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = '复制结果', 1500);
                });
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            input.value = '';
            output.value = '';
            document.getElementById('status').textContent = '就绪';
            document.getElementById('stats').textContent = '';
            updateInfo();
        });

        input.addEventListener('input', updateInfo);

        function updateInfo() {
            document.getElementById('inputInfo').textContent = input.value.split('\n').length + ' 行';
            document.getElementById('outputInfo').textContent = output.value.split('\n').length + ' 行';
        }
    </script>
</body>
</html>
