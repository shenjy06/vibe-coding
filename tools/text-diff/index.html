<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本差异对比</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            background: linear-gradient(135deg, #34d399, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .editor-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media (max-width: 900px) { .editor-area { grid-template-columns: 1fr; } }
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            color: #94a3b8;
        }
        textarea {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.3);
            border: none;
            color: #e0e0e0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            padding: 15px;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }
        .diff-result {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .diff-header {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .diff-header h3 { font-size: 14px; color: #94a3b8; }
        .diff-stats { display: flex; gap: 15px; font-size: 13px; }
        .stat-added { color: #34d399; }
        .stat-removed { color: #f87171; }
        .stat-unchanged { color: #6b7280; }
        .diff-content {
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.8;
            overflow-x: auto;
        }
        .diff-line {
            padding: 2px 10px;
            white-space: pre;
            border-radius: 3px;
        }
        .diff-line.added {
            background: rgba(52,211,153,0.15);
            color: #34d399;
        }
        .diff-line.removed {
            background: rgba(248,113,113,0.15);
            color: #f87171;
        }
        .diff-line.unchanged {
            color: #6b7280;
        }
        .diff-line .line-num {
            display: inline-block;
            width: 40px;
            color: #4b5563;
            text-align: right;
            margin-right: 15px;
            user-select: none;
        }
        .diff-line .line-prefix {
            display: inline-block;
            width: 20px;
            text-align: center;
            margin-right: 5px;
            font-weight: bold;
        }
        .line-numbers {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .line-numbers span {
            font-size: 12px;
            color: #6b7280;
        }
        .options {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .option-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #94a3b8;
            cursor: pointer;
        }
        .option-label input { accent-color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>文本差异对比</h1>
        <div class="toolbar">
            <button class="btn btn-primary" id="compareBtn">对比差异</button>
            <button class="btn btn-secondary" id="swapBtn">交换文本</button>
            <button class="btn btn-secondary" id="clearBtn">清空</button>
            <div class="options">
                <label class="option-label">
                    <input type="checkbox" id="ignoreSpace"> 忽略空白
                </label>
                <label class="option-label">
                    <input type="checkbox" id="ignoreCase"> 忽略大小写
                </label>
            </div>
        </div>
        <div class="editor-area">
            <div class="panel">
                <div class="panel-header">原始文本</div>
                <textarea id="text1" placeholder="输入原始文本...">Hello World
This is line 2
This is line 3
Original line 4
Line 5 unchanged
Line 6 unchanged</textarea>
            </div>
            <div class="panel">
                <div class="panel-header">修改后文本</div>
                <textarea id="text2" placeholder="输入修改后文本...">Hello World
This is line 2 modified
This is line 3
New line inserted
Line 5 unchanged
Line 6 changed
Added new line</textarea>
            </div>
        </div>
        <div class="diff-result" id="diffResult" style="display:none;">
            <div class="diff-header">
                <h3>差异结果</h3>
                <div class="diff-stats">
                    <span class="stat-added" id="addedCount">+0</span>
                    <span class="stat-removed" id="removedCount">-0</span>
                    <span class="stat-unchanged" id="unchangedCount">=0</span>
                </div>
            </div>
            <div class="diff-content" id="diffContent"></div>
        </div>
    </div>
    <script>
        document.getElementById('compareBtn').addEventListener('click', compare);
        document.getElementById('swapBtn').addEventListener('click', () => {
            const t1 = document.getElementById('text1');
            const t2 = document.getElementById('text2');
            [t1.value, t2.value] = [t2.value, t1.value];
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('text1').value = '';
            document.getElementById('text2').value = '';
            document.getElementById('diffResult').style.display = 'none';
        });

        function compare() {
            let text1 = document.getElementById('text1').value;
            let text2 = document.getElementById('text2').value;
            const ignoreSpace = document.getElementById('ignoreSpace').checked;
            const ignoreCase = document.getElementById('ignoreCase').checked;

            let lines1 = text1.split('\n');
            let lines2 = text2.split('\n');

            if (ignoreSpace) {
                lines1 = lines1.map(l => l.trim());
                lines2 = lines2.map(l => l.trim());
            }
            if (ignoreCase) {
                lines1 = lines1.map(l => l.toLowerCase());
                lines2 = lines2.map(l => l.toLowerCase());
            }

            const diff = computeDiff(lines1, lines2);
            renderDiff(diff, text1.split('\n'), text2.split('\n'));
        }

        function computeDiff(oldLines, newLines) {
            const m = oldLines.length;
            const n = newLines.length;
            const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));

            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (oldLines[i - 1] === newLines[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                    }
                }
            }

            const result = [];
            let i = m, j = n;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && oldLines[i - 1] === newLines[j - 1]) {
                    result.unshift({ type: 'unchanged', oldLine: i, newLine: j });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                    result.unshift({ type: 'added', newLine: j });
                    j--;
                } else {
                    result.unshift({ type: 'removed', oldLine: i });
                    i--;
                }
            }
            return result;
        }

        function renderDiff(diff, originalLines, modifiedLines) {
            const diffResult = document.getElementById('diffResult');
            const diffContent = document.getElementById('diffContent');
            diffResult.style.display = 'block';

            let added = 0, removed = 0, unchanged = 0;
            let html = '';

            diff.forEach(item => {
                if (item.type === 'added') {
                    added++;
                    html += `<div class="diff-line added"><span class="line-num">${item.newLine}</span><span class="line-prefix">+</span>${escapeHtml(modifiedLines[item.newLine - 1])}</div>`;
                } else if (item.type === 'removed') {
                    removed++;
                    html += `<div class="diff-line removed"><span class="line-num">${item.oldLine}</span><span class="line-prefix">-</span>${escapeHtml(originalLines[item.oldLine - 1])}</div>`;
                } else {
                    unchanged++;
                    html += `<div class="diff-line unchanged"><span class="line-num">${item.oldLine}</span><span class="line-prefix"> </span>${escapeHtml(originalLines[item.oldLine - 1])}</div>`;
                }
            });

            diffContent.innerHTML = html || '<div style="color:#6b7280;text-align:center;padding:20px;">两段文本完全相同</div>';
            document.getElementById('addedCount').textContent = `+${added}`;
            document.getElementById('removedCount').textContent = `-${removed}`;
            document.getElementById('unchangedCount').textContent = `=${unchanged}`;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
