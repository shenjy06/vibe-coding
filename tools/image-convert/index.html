<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片格式转换</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .panel h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: #667eea; background: rgba(102,126,234,0.1); }
        .upload-icon { font-size: 64px; margin-bottom: 15px; }
        .upload-text { color: #888; font-size: 16px; }
        .upload-hint { color: #666; font-size: 13px; margin-top: 10px; }
        #fileInput { display: none; }
        .preview-area {
            display: none;
            gap: 20px;
            margin-bottom: 15px;
        }
        .preview-area.visible { display: grid; grid-template-columns: 1fr 1fr; }
        @media (max-width: 768px) { .preview-area.visible { grid-template-columns: 1fr; } }
        .preview-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .preview-box h4 {
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
        }
        .format-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }
        .format-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #ccc;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .format-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        .format-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
        .quality-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        input[type="range"] {
            flex: 1;
            height: 8px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }
        .quality-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            min-width: 50px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片格式转换</h1>
        <div class="panel" id="uploadPanel">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">🖼️</div>
                <div class="upload-text">拖拽图片到这里，或点击上传</div>
                <div class="upload-hint">支持 JPG、PNG、WebP、BMP、GIF 格式</div>
                <input type="file" id="fileInput" accept="image/*">
            </div>
        </div>
        <div class="preview-area" id="previewArea">
            <div class="preview-box">
                <h4>原始图片</h4>
                <img id="originalImg" src="" alt="原图">
                <div id="originalInfo" style="margin-top:10px;font-size:12px;color:#666;"></div>
            </div>
            <div class="preview-box">
                <h4>转换预览</h4>
                <img id="convertedImg" src="" alt="转换后">
                <div id="convertedInfo" style="margin-top:10px;font-size:12px;color:#666;"></div>
            </div>
        </div>
        <div class="panel" id="controlsPanel" style="display:none;">
            <h3>输出格式</h3>
            <div class="format-select">
                <div class="format-btn active" data-format="image/jpeg">JPG</div>
                <div class="format-btn" data-format="image/png">PNG</div>
                <div class="format-btn" data-format="image/webp">WebP</div>
                <div class="format-btn" data-format="image/bmp">BMP</div>
            </div>
            <div id="qualitySection">
                <h3 style="margin-bottom:10px;">压缩质量</h3>
                <div class="quality-control">
                    <input type="range" id="quality" min="1" max="100" value="90">
                    <span class="quality-value" id="qualityValue">90%</span>
                </div>
            </div>
            <div class="stats" id="stats" style="display:none;">
                <div class="stat-item">
                    <div class="stat-label">原始大小</div>
                    <div class="stat-value" id="originalSize">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">转换后大小</div>
                    <div class="stat-value" id="convertedSize">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">压缩率</div>
                    <div class="stat-value" id="ratio">-</div>
                </div>
            </div>
            <button class="btn btn-primary" id="downloadBtn">下载转换图片</button>
            <button class="btn btn-secondary" id="resetBtn">重新选择</button>
        </div>
    </div>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const controlsPanel = document.getElementById('controlsPanel');
        let originalFile = null;
        let convertedBlob = null;
        let currentFormat = 'image/jpeg';

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#667eea'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'rgba(255,255,255,0.2)'; });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'rgba(255,255,255,0.2)';
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return;
            originalFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('originalImg').src = e.target.result;
                document.getElementById('originalInfo').textContent = `${file.name} | ${formatSize(file.size)}`;
                document.getElementById('uploadPanel').style.display = 'none';
                previewArea.classList.add('visible');
                controlsPanel.style.display = 'block';
                convertImage();
            };
            reader.readAsDataURL(file);
        }

        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFormat = btn.dataset.format;
                document.getElementById('qualitySection').style.display = currentFormat === 'image/png' ? 'none' : 'block';
                convertImage();
            });
        });

        document.getElementById('quality').addEventListener('input', (e) => {
            document.getElementById('qualityValue').textContent = e.target.value + '%';
            convertImage();
        });

        function convertImage() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('originalImg');

            img.onload = () => {
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);

                const quality = parseInt(document.getElementById('quality').value) / 100;
                canvas.toBlob((blob) => {
                    convertedBlob = blob;
                    document.getElementById('convertedImg').src = URL.createObjectURL(blob);
                    document.getElementById('convertedInfo').textContent = `${currentFormat.split('/')[1].toUpperCase()} | ${formatSize(blob.size)}`;

                    document.getElementById('stats').style.display = 'grid';
                    document.getElementById('originalSize').textContent = formatSize(originalFile.size);
                    document.getElementById('convertedSize').textContent = formatSize(blob.size);
                    const ratio = ((1 - blob.size / originalFile.size) * 100).toFixed(1);
                    document.getElementById('ratio').textContent = ratio + '%';
                }, currentFormat, quality);
            };
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!convertedBlob) return;
            const ext = currentFormat.split('/')[1] === 'jpeg' ? 'jpg' : currentFormat.split('/')[1];
            const link = document.createElement('a');
            link.download = originalFile.name.replace(/\.[^/.]+$/, '') + '.' + ext;
            link.href = URL.createObjectURL(convertedBlob);
            link.click();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            originalFile = null;
            convertedBlob = null;
            fileInput.value = '';
            document.getElementById('uploadPanel').style.display = 'block';
            previewArea.classList.remove('visible');
            controlsPanel.style.display = 'none';
        });

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
    </script>
</body>
</html>
