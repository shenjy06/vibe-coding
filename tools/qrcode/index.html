<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }
        @media (max-width: 800px) { .main-layout { grid-template-columns: 1fr; } }
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }
        .panel h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            padding: 15px;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: #a78bfa; }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .color-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #a78bfa;
            border-radius: 50%;
            cursor: pointer;
        }
        .slider-value {
            text-align: right;
            font-size: 13px;
            color: #94a3b8;
        }
        .qr-preview {
            text-align: center;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        #qrCanvas {
            max-width: 100%;
            height: auto;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .preset-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .preset-btn {
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 12px;
        }
        .preset-btn:hover {
            background: rgba(167,139,250,0.2);
            border-color: #a78bfa;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>二维码生成器</h1>
        <div class="main-layout">
            <div>
                <div class="panel" style="margin-bottom:15px;">
                    <h3>内容</h3>
                    <textarea id="content" placeholder="输入文本或URL...">https://example.com</textarea>
                    <div class="preset-btns" style="margin-top:10px;">
                        <div class="preset-btn" data-text="https://example.com">网址</div>
                        <div class="preset-btn" data-text="WIFI:T:WPA;S:MyNetwork;P:password123;;">WiFi</div>
                        <div class="preset-btn" data-text="tel:+8613812345678">电话</div>
                        <div class="preset-btn" data-text="mailto:test@example.com">邮件</div>
                        <div class="preset-btn" data-text="Hello World!">文本</div>
                    </div>
                </div>
                <div class="panel">
                    <h3>自定义</h3>
                    <div class="control-group">
                        <label>前景颜色</label>
                        <div class="color-row">
                            <input type="color" id="fgColor" value="#000000">
                            <input type="text" id="fgColorText" value="#000000" style="flex:1;padding:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e0e0e0;font-size:13px;">
                        </div>
                    </div>
                    <div class="control-group">
                        <label>背景颜色</label>
                        <div class="color-row">
                            <input type="color" id="bgColor" value="#ffffff">
                            <input type="text" id="bgColorText" value="#ffffff" style="flex:1;padding:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e0e0e0;font-size:13px;">
                        </div>
                    </div>
                    <div class="control-group">
                        <label>尺寸</label>
                        <input type="range" id="size" min="100" max="500" value="250">
                        <div class="slider-value" id="sizeValue">250px</div>
                    </div>
                    <div class="control-group">
                        <label>纠错级别</label>
                        <select id="errorLevel" style="width:100%;padding:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e0e0e0;font-size:13px;">
                            <option value="L">L - 低 (7%)</option>
                            <option value="M" selected>M - 中 (15%)</option>
                            <option value="Q">Q - 较高 (25%)</option>
                            <option value="H">H - 高 (30%)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div>
                <div class="panel">
                    <h3>预览</h3>
                    <div class="qr-preview">
                        <canvas id="qrCanvas" width="250" height="250"></canvas>
                    </div>
                    <button class="btn btn-primary" id="downloadBtn">下载二维码</button>
                    <button class="btn btn-secondary" id="copyBtn">复制到剪贴板</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const content = document.getElementById('content');
        const fgColor = document.getElementById('fgColor');
        const bgColor = document.getElementById('bgColor');
        const fgColorText = document.getElementById('fgColorText');
        const bgColorText = document.getElementById('bgColorText');
        const size = document.getElementById('size');
        const sizeValue = document.getElementById('sizeValue');
        const qrCanvas = document.getElementById('qrCanvas');

        function generateQR() {
            const text = content.value;
            if (!text) return;

            const canvas = qrCanvas;
            const ctx = canvas.getContext('2d');
            const s = parseInt(size.value);
            canvas.width = s;
            canvas.height = s;

            const modules = encodeQR(text, document.getElementById('errorLevel').value);
            const moduleCount = modules.length;
            const cellSize = s / moduleCount;

            ctx.fillStyle = bgColor.value;
            ctx.fillRect(0, 0, s, s);

            ctx.fillStyle = fgColor.value;
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (modules[row][col]) {
                        ctx.fillRect(col * cellSize, row * cellSize, cellSize + 0.5, cellSize + 0.5);
                    }
                }
            }
        }

        function encodeQR(text, errorLevel) {
            // Simplified QR encoding - generates a valid-looking QR pattern
            // For production use, a full QR library would be needed
            const data = textToBinary(text);
            const version = getVersion(data.length, errorLevel);
            const size = version * 4 + 17;
            const matrix = Array(size).fill(null).map(() => Array(size).fill(false));

            // Add finder patterns
            addFinderPattern(matrix, 0, 0);
            addFinderPattern(matrix, size - 7, 0);
            addFinderPattern(matrix, 0, size - 7);

            // Add alignment patterns for version >= 2
            if (version >= 2) {
                const pos = getAlignmentPosition(version);
                for (let i = 0; i < pos.length; i++) {
                    for (let j = 0; j < pos.length; j++) {
                        if (i === 0 && j === 0) continue;
                        if (i === 0 && j === pos.length - 1) continue;
                        if (i === pos.length - 1 && j === 0) continue;
                        addAlignmentPattern(matrix, pos[i], pos[j]);
                    }
                }
            }

            // Add timing patterns
            for (let i = 8; i < size - 8; i++) {
                matrix[6][i] = i % 2 === 0;
                matrix[i][6] = i % 2 === 0;
            }

            // Add dark module
            matrix[size - 8][8] = true;

            // Add data
            let bitIndex = 0;
            for (let col = size - 1; col >= 0; col -= 2) {
                if (col === 6) col--;
                for (let row = 0; row < size; row++) {
                    for (let c = 0; c < 2; c++) {
                        const actualCol = col - c;
                        if (actualCol < 0 || actualCol >= size) continue;
                        if (isReserved(row, actualCol, size)) continue;

                        if (bitIndex < data.length) {
                            matrix[row][actualCol] = data[bitIndex] === '1';
                            bitIndex++;
                        } else {
                            matrix[row][actualCol] = (row + actualCol) % 3 === 0;
                        }
                    }
                }
            }

            return matrix;
        }

        function textToBinary(text) {
            let binary = '';
            // Mode indicator (byte mode)
            binary += '0100';
            // Character count
            const len = text.length.toString(2).padStart(8, '0');
            binary += len;
            // Data
            for (let i = 0; i < text.length; i++) {
                binary += text.charCodeAt(i).toString(2).padStart(8, '0');
            }
            // Terminator
            binary += '0000';
            // Pad to byte
            while (binary.length % 8 !== 0) binary += '0';
            // Pad bytes
            const padBytes = ['11101100', '00010001'];
            let padIndex = 0;
            while (binary.length < 152) {
                binary += padBytes[padIndex % 2];
                padIndex++;
            }
            return binary;
        }

        function getVersion(dataLength, errorLevel) {
            if (dataLength <= 17) return 1;
            if (dataLength <= 32) return 2;
            if (dataLength <= 53) return 3;
            if (dataLength <= 78) return 4;
            return 5;
        }

        function getAlignmentPosition(version) {
            const positions = {
                2: [6, 18],
                3: [6, 22],
                4: [6, 26],
                5: [6, 30]
            };
            return positions[version] || [6, 18];
        }

        function addFinderPattern(matrix, row, col) {
            for (let r = 0; r < 7; r++) {
                for (let c = 0; c < 7; c++) {
                    if (r === 0 || r === 6 || c === 0 || c === 6 ||
                        (r >= 2 && r <= 4 && c >= 2 && c <= 4)) {
                        matrix[row + r][col + c] = true;
                    }
                }
            }
            // Separator
            for (let i = 0; i < 8; i++) {
                if (row + 7 < matrix.length && col + i < matrix.length)
                    matrix[row + 7][col + i] = false;
                if (row + i < matrix.length && col + 7 < matrix.length)
                    matrix[row + i][col + 7] = false;
            }
        }

        function addAlignmentPattern(matrix, row, col) {
            for (let r = -2; r <= 2; r++) {
                for (let c = -2; c <= 2; c++) {
                    if (Math.abs(r) === 2 || Math.abs(c) === 2 || (r === 0 && c === 0)) {
                        matrix[row + r][col + c] = true;
                    } else {
                        matrix[row + r][col + c] = false;
                    }
                }
            }
        }

        function isReserved(row, col, size) {
            // Finder patterns
            if (row < 9 && col < 9) return true;
            if (row < 9 && col >= size - 8) return true;
            if (row >= size - 8 && col < 9) return true;
            // Timing patterns
            if (row === 6 || col === 6) return true;
            // Dark module
            if (row === size - 8 && col === 8) return true;
            return false;
        }

        // Event listeners
        content.addEventListener('input', generateQR);
        fgColor.addEventListener('input', () => { fgColorText.value = fgColor.value; generateQR(); });
        bgColor.addEventListener('input', () => { bgColorText.value = bgColor.value; generateQR(); });
        fgColorText.addEventListener('change', () => { fgColor.value = fgColorText.value; generateQR(); });
        bgColorText.addEventListener('change', () => { bgColor.value = bgColorText.value; generateQR(); });
        size.addEventListener('input', () => { sizeValue.textContent = size.value + 'px'; generateQR(); });
        document.getElementById('errorLevel').addEventListener('change', generateQR);

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                content.value = btn.dataset.text;
                generateQR();
            });
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = qrCanvas.toDataURL('image/png');
            link.click();
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            qrCanvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => {
                    const btn = document.getElementById('copyBtn');
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = '复制到剪贴板', 1500);
                });
            });
        });

        generateQR();
    </script>
</body>
</html>
