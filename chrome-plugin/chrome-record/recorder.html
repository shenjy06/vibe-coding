<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Tab 录制</title>
  <link rel="stylesheet" href="recorder.css">
</head>
<body>
  <div class="container">
    <h1>Tab 页面录制</h1>
    <p class="hint">点击下方按钮选择要录制的浏览器标签页</p>

    <div class="controls">
      <button id="btnPickTab" class="btn btn-primary">选择标签页并开始录制</button>
      <button id="btnStop" class="btn btn-danger" disabled>停止录制</button>
    </div>

    <div id="status" class="status"></div>

    <div id="previewBox" class="preview-box" style="display:none">
      <video id="previewVideo" autoplay playsinline muted></video>
    </div>
  </div>

  <script src="recorder.js"></script>
</body>
</html>
