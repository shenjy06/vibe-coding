<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin: 0 0 16px;
    }
    #counter {
      font-size: 32px;
      font-weight: bold;
      color: #4285f4;
      margin: 8px 0;
    }
    button {
      padding: 8px 24px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 4px;
    }
    #btn-increment { background: #4285f4; color: #fff; }
    #btn-reset { background: #e0e0e0; color: #333; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Hello, Chrome Extension!</h1>
  <p>点击按钮计数，关闭弹窗后数据仍然保留</p>
  <div id="counter">0</div>
  <button id="btn-increment">+1</button>
  <button id="btn-reset">重置</button>
  <script src="popup.js"></script>
</body>
</html>
